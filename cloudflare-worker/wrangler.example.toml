name = "phoneclaw"
main = "cloudflare-worker/twilio-elevenlabs-worker.mjs"
compatibility_date = "2026-06-18"
account_id = "replace-with-cloudflare-account-id"
workers_dev = true

# Optional custom domain route.
# routes = [
#   { pattern = "webhooks.example.com", custom_domain = true }
# ]

[observability]
enabled = true

[vars]
ELEVENLABS_AGENT_ID = "replace-with-elevenlabs-agent-id"
ELEVENLABS_API_BASE = "https://api.elevenlabs.io"
ELEVENLABS_TELEPHONY_AUDIO_FORMAT = "ulaw_8000"
TWILIO_PHONE_NUMBER = "+15555550123"
